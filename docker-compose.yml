version: "3.9"

x-node-base: &node-base
  build:
    context: .
    dockerfile: Dockerfile
  image: sdcc-node:local
  command: ["--config", "/config/config.yaml"]
  networks:
    - sdcc-net
  restart: unless-stopped

services:
  node1:
    <<: *node-base
    container_name: sdcc-node1
    volumes:
      - ./configs/node1.yaml:/config/config.yaml:ro

  node2:
    <<: *node-base
    container_name: sdcc-node2
    volumes:
      - ./configs/node2.yaml:/config/config.yaml:ro

  node3:
    <<: *node-base
    container_name: sdcc-node3
    volumes:
      - ./configs/node3.yaml:/config/config.yaml:ro

networks:
  sdcc-net:
    name: sdcc-net
    driver: bridge
